<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">

  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Plant Care">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#10B981">
  <meta name="description" content="Smart plant care scheduling with weather-based recommendations">
  <meta name="format-detection" content="telephone=no">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon.svg">
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.svg">

  <!-- iOS Splash Screens -->
  <link rel="apple-touch-startup-image" href="/icons/splash.svg"
        media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="/icons/splash.svg"
        media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/icons/splash.svg"
        media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/icons/splash.svg"
        media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/icons/splash.svg"
        media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/icons/splash.svg"
        media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)">

  <title>Plant Care</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Status Bar spacer (standalone mode) -->
    <div class="status-bar"></div>

    <!-- iOS Install Banner (Safari only, not in standalone) -->
    <div class="install-banner" id="installBanner" style="display:none;">
      <div class="install-banner-content">
        <span class="install-banner-text">
          Install: tap
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-3px;">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          then <strong>"Add to Home Screen"</strong>
        </span>
        <button class="install-banner-close" id="installBannerClose">&times;</button>
      </div>
    </div>

    <!-- Header -->
    <header class="app-header" id="appHeader">
      <h1 class="header-title" id="headerTitle">Plant Care</h1>
      <div class="header-subtitle" id="headerSubtitle">Smart Scheduling</div>
    </header>

    <!-- Main Content Area -->
    <main class="app-content" id="mainContent">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-plants" class="page"></div>
      <div id="page-calendar" class="page"></div>
      <div id="page-settings" class="page"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-item active" data-page="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-page="plants">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 20.5C7 15 9 11 12 8c3 3 5 7 5 12.5"/>
          <path d="M12 8V3"/>
          <path d="M9 4c2 1 3 3 3 4"/>
          <path d="M15 4c-2 1-3 3-3 4"/>
        </svg>
        <span class="nav-label">Plants</span>
      </button>
      <button class="nav-item" data-page="calendar">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="nav-label">Calendar</span>
      </button>
      <button class="nav-item" data-page="settings">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        <span class="nav-label">Settings</span>
      </button>
    </nav>
  </div>

  <!-- Core data & services (load order matters) -->
  <script src="/js/data/plantCareData.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/services/scheduleEngine.js"></script>
  <script src="/js/services/weatherService.js"></script>
  <script src="/js/api.js"></script>

  <!-- UI Components -->
  <script src="/js/components/weatherWidget.js"></script>
  <script src="/js/components/plantCard.js"></script>
  <script src="/js/components/scheduleCard.js"></script>

  <!-- Pages -->
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/plants.js"></script>
  <script src="/js/pages/calendar.js"></script>
  <script src="/js/pages/settings.js"></script>

  <!-- App Controller -->
  <script src="/js/app.js"></script>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => {
            console.log('SW registered, scope:', reg.scope);
            setInterval(() => reg.update(), 3600000);
          })
          .catch(err => console.log('SW failed:', err));
      });
    }
  </script>
</body>
</html>
